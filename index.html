<!DOCTYPE html>
<html>
<head>
  <title>Drawify</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">
    <h1>Drawify</h1>
    <button id="themeToggle">🌙</button>
  </div>

 
  <div class="main">

    <div class="toolbar">
        
        <div class ="tools">
          <button id="rectangle" data-label="add Rectangle"><svg xmlns="http://www.w3.org/2000/svg" width="1.75em" height="1.75em" viewBox="0 0 72 72"><title xmlns="">black-rectangle</title><path d="M67 17H5v38h62z"/><path fill="#c233ff" d="M67 17H5v38h62z"/><path fill="none" stroke="#ab47f3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M67 17H5v38h62z"/></svg></button>
          <button id="circle" data-label="add circle"><svg xmlns="http://www.w3.org/2000/svg" width="1.75em" height="1.75em" viewBox="0 0 72 72"><title xmlns="">purple-circle</title><circle cx="36" cy="36" r="28" fill="#f6a5fb"/><circle cx="36" cy="36" r="28" fill="none" stroke="#f0a9ff" stroke-linejoin="round" stroke-width="2"/></svg></button>
          <button id="triangle" data-label=" add Triangle"><svg xmlns="http://www.w3.org/2000/svg" width="1.75em" height="1.75em" viewBox="0 0 72 72"><title xmlns="">red-triangle-pointed-up</title><path fill="#e5ff00" d="M33.545 15.252L11.32 53.748c-1.09 1.89.273 4.252 2.455 4.252h44.452c2.182 0 3.546-2.362 2.455-4.252L38.455 15.252c-1.091-1.89-3.819-1.89-4.91 0"/><path fill="none" stroke="#e5ff00" stroke-miterlimit="10" stroke-width="2" d="M33.545 15.252L11.32 53.748c-1.09 1.89.273 4.252 2.455 4.252h44.452c2.182 0 3.546-2.362 2.455-4.252L38.455 15.252c-1.091-1.89-3.819-1.89-4.91 0z"/></svg></button>
          <button id="imageBtn" data-label="add image"><svg xmlns="http://www.w3.org/2000/svg" width="1.75em" height="1.75em" viewBox="0 0 72 72"><title xmlns="">picture</title><path fill="#b1cc33" d="M6 41h60v13H6z"/><path fill="#5c9e31" d="M42 41h24v13H31z"/><path fill="#92d3f5" d="M6 18h60v23H6z"/><path fill="#61b2e4" d="M61 18h5v23H42z"/><path fill="#f8a24d" d="m22 43l11-11l11 11z"/><path fill="#f8a24d" d="m28.546 43.046l16.5-16.5L60.75 42.25z"/><g fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2"><path d="M6 18h60v36H6z"/><path d="M44 43H22l11-11l6.998 6.998"/><path d="M39.797 33.203L45 28l15 15H43.999"/></g></svg></button>
          <button id = "brush" data-label="free draw"><svg xmlns="http://www.w3.org/2000/svg" width="1.75em" height="1.75em" viewBox="0 0 72 72"><title xmlns="">pencil</title><path fill="#3f3f3f" d="m14.594 53.154l3.66 3.66l-5.63 2.279z"/><path fill="#f4aa41" d="m18.038 41.876l18.83-18.83l11.313 11.313l-18.67 18.67"/><path fill="#a57939" d="m14.413 52.566l3.515-9.171l9.9 9.899l-9.172 3.515"/><path fill="#ea5a47" d="m42.921 16.993l7.502-7.502l11.313 11.313l-7.439 7.438"/><path fill="#9b9b9a" d="m35.65 24.264l7.682-7.682l11.313 11.313l-7.617 7.617"/><g fill="none" stroke="#000" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2"><path d="m18.63 56.82l9.198-3.526l25.993-25.993l-9.9-9.9l-25.993 25.994l-3.538 9.208zm28.705-42.833l3.504-3.503l9.899 9.899l-3.474 3.474m-38.708 18.91l9.9 9.899"/><path d="m14.398 52.582l-2.491 6.733l6.749-2.506M36.91 25.007l9.512 9.513"/></g></svg></button>
        </div>
        
        <div class = "brushStyles">
            <button id="normal">🖋</button>
            <button id="thick">🖌</button>
            <button id="dashed">🖌</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

  </div>

  <div class ="bottombar">
   <button id="saveBtn">Save</button>
   <button id="clearBtn">Clear</button>
  </div>


 <script src="script.js"></script>

</body>
</html>
