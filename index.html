<!DOCTYPE html>
<html>
<head>
  <title>Drawify</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="topbar">
    <h1>Drawify</h1>
    <button id="themeToggle">🌙</button>
  </div>

 
  <div class="main">

    <div class="toolbar">
        
        <div class ="tools">
          <button id="rectangle">⏹</button>
          <button id="circle">⬤</button>
          <button id="triangle">▲</button>
          <button id="imageBtn">🖼️</button>
          <button>✏️</button>
        </div>
        
        <div class = "brushStyles">
            <button id="normal">🖋</button>
            <button id="thick">🖌</button>
            <button id="dashed">🖌</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

  </div>

  <div class ="bottombar">
   <button id="saveBtn">Save</button>
   <button id="clearBtn">Clear</button>
  </div>


 <script src="script.js"></script>

</body>
</html>
